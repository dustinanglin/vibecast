<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibecast — Sliver in All Vibes</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>html,body{margin:0;background:#f0eee9}*{box-sizing:border-box}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="vibes-shared.jsx"></script>
<script type="text/babel" data-presets="env,react">
const T = window.VIBE_TOKENS;
const PODS = window.PODCASTS;
const VIBE_BY_ID = window.VIBE_BY_ID;

// ── Mock data: which rows are started, with a progress %
const ROW_STATE = {
  'hard-fork':   { state: 'started', pct: 36 },
  'daily':       { state: 'unplayed' },
  'up-first':    { state: 'unplayed' },
  'vergecast':   { state: 'started', pct: 72 },
  '99pi':        { state: 'unplayed' },
  'planet-money':{ state: 'started', pct: 18 },
  'huberman':    { state: 'unplayed' },
  'rich-roll':   { state: 'started', pct: 54 },
  'sleep-with-me': { state: 'unplayed' },
  'on-being':    { state: 'unplayed' },
};
const ALL_VIBES_ORDER = ['hard-fork','daily','up-first','vergecast','99pi','planet-money','huberman','rich-roll','on-being','sleep-with-me'];
const AROUND_ORDER    = ['hard-fork','vergecast','99pi','planet-money','rich-roll'];

// Tinted-card bg as in the locked spec
function tintBg(pod) {
  const vibes = pod.vibes.map(v => VIBE_BY_ID[v]);
  return vibes.length > 1 ? `linear-gradient(105deg, ${vibes[0].chip} 0%, ${vibes[1].chip} 100%)` : vibes[0].chip;
}
function PRing({ pct = 0, color, size = 11, ring = 1.6 }) {
  const r = (size - ring) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(1, pct / 100)));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeOpacity={0.22} strokeWidth={ring} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={ring} strokeLinecap="round"
              strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} />
    </svg>
  );
}

// ── Sliver renderer ─────────────────────────────────
// mode: 'primary' | 'split' | 'ink' | 'context'
//   primary  → first vibe color (single sliver, even on multi-vibe)
//   split    → 50/50 split for multi-vibe shows
//   ink      → ink for All Vibes, vibe color for vibe-specific
//   context  → matches the page's vibe context (uniform)
function Sliver({ pod, mode = 'primary', contextVibe }) {
  const vibes = pod.vibes.map(v => VIBE_BY_ID[v]);
  const baseStyle = { position: 'absolute', left: 0, top: 6, bottom: 6, width: 4, borderRadius: '0 2px 2px 0' };
  if (mode === 'context' && contextVibe) {
    return <div style={{ ...baseStyle, background: contextVibe.color }} />;
  }
  if (mode === 'ink') return <div style={{ ...baseStyle, background: T.ink, opacity: 0.55 }} />;
  if (mode === 'split' && vibes.length > 1) {
    return (
      <div style={baseStyle}>
        <div style={{ position: 'absolute', inset: 0, top: 0, bottom: '50%', background: vibes[0].color }} />
        <div style={{ position: 'absolute', inset: 0, top: '50%', bottom: 0, background: vibes[1].color }} />
      </div>
    );
  }
  return <div style={{ ...baseStyle, background: vibes[0].color }} />;
}

// ── Row ─────────────────────────────────
function Row({ pod, pos, sliverMode, contextVibe }) {
  const rs = ROW_STATE[pod.id] || { state: 'unplayed' };
  const ep = pod.latest;
  const pct = rs.pct || 0;
  const minLeft = Math.max(1, Math.round(ep.total * (1 - pct / 100)));
  const primary = VIBE_BY_ID[pod.vibes[0]];

  return (
    <div style={{ position: 'relative', display: 'flex', gap: 12, padding: '12px 12px 12px 14px', marginBottom: 8, background: tintBg(pod), borderRadius: 14, border: `1px solid ${T.hairline}` }}>
      {rs.state === 'unplayed' && <Sliver pod={pod} mode={sliverMode} contextVibe={contextVibe} />}
      <div style={{ width: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        fontFamily: T.mono, fontSize: 11, fontWeight: 600,
        color: rs.state === 'unplayed' ? 'rgba(0,0,0,0.45)' : 'rgba(0,0,0,0.30)',
        letterSpacing: '0.04em' }}>
        {String(pos).padStart(2, '0')}
      </div>
      <window.VibeCover pod={pod} size={56} radius={4} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: T.mono, fontSize: 10, letterSpacing: '0.10em', color: T.ink, textTransform: 'uppercase', fontWeight: 600 }}>
          {rs.state === 'started' ? (
            <>
              <PRing pct={pct} color={primary.color} size={11} />
              <span style={{ color: primary.ink, fontWeight: 700 }}>{minLeft}M LEFT</span>
              <span style={{ color: 'rgba(0,0,0,0.40)' }}>· {pod.title}</span>
            </>
          ) : (
            <>
              <span style={{ color: 'rgba(0,0,0,0.55)' }}>{pod.title}</span>
              <span style={{ color: 'rgba(0,0,0,0.35)' }}>· {ep.age}</span>
            </>
          )}
        </div>
        <div style={{
          fontFamily: T.serif, fontSize: 15,
          fontWeight: rs.state === 'started' ? 300 : 500,
          fontStyle: rs.state === 'started' ? 'italic' : 'normal',
          lineHeight: 1.22, marginTop: 3,
          color: rs.state === 'started' ? 'rgba(26,23,20,0.78)' : T.ink,
          letterSpacing: '-0.005em',
          minHeight: '2.44em',
          display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden',
        }}>{ep.title}</div>
        <div style={{ fontFamily: T.mono, fontSize: 9, color: 'rgba(0,0,0,0.45)', letterSpacing: '0.06em', marginTop: 4, fontWeight: 600 }}>
          {rs.state === 'started'
            ? `PAUSED AT ${Math.round(ep.total * pct / 100)}M · ${ep.total} MIN TOTAL`
            : `${ep.total} MIN`}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <button style={{ width: 38, height: 38, borderRadius: 999, background: T.paper, border: `1px solid ${T.hairline}`, color: T.ink, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill={T.ink}><path d="M8 5v14l11-7z" /></svg>
        </button>
      </div>
    </div>
  );
}

function ViewHeader({ title, vibe }) {
  return (
    <div style={{ padding: '20px 16px 14px' }}>
      {vibe ? (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', color: 'rgba(0,0,0,0.50)', textTransform: 'uppercase', fontWeight: 600 }}>
            <span style={{ width: 8, height: 8, borderRadius: 999, background: vibe.color, display: 'inline-block' }} />
            VIBE
          </div>
          <div style={{ fontFamily: T.serif, fontSize: 32, fontWeight: 500, letterSpacing: '-0.025em', marginTop: 2, color: T.ink }}>{title}</div>
        </>
      ) : (
        <>
          <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', color: 'rgba(0,0,0,0.50)', textTransform: 'uppercase', fontWeight: 600 }}>YOUR LIBRARY</div>
          <div style={{ fontFamily: T.serif, fontSize: 32, fontWeight: 500, letterSpacing: '-0.025em', marginTop: 2, color: T.ink }}>All vibes</div>
        </>
      )}
    </div>
  );
}

function Phone({ children }) {
  return <window.IOSDevice width={402} height={874} dark={false}>
    <div style={{ background: T.bg, height: '100%', overflow: 'auto' }}>{children}</div>
  </window.IOSDevice>;
}

function AllVibesView({ sliverMode }) {
  return (
    <Phone>
      <ViewHeader />
      <div style={{ padding: '0 12px' }}>
        {ALL_VIBES_ORDER.map((id, i) => <Row key={id} pos={i + 1} pod={window.PODCAST_BY_ID[id]} sliverMode={sliverMode} />)}
      </div>
    </Phone>
  );
}
function VibeView({ vibeId, sliverMode }) {
  const vibe = VIBE_BY_ID[vibeId];
  return (
    <Phone>
      <ViewHeader title={vibe.label} vibe={vibe} />
      <div style={{ padding: '0 12px' }}>
        {AROUND_ORDER.map((id, i) => <Row key={id} pos={i + 1} pod={window.PODCAST_BY_ID[id]} sliverMode={sliverMode} contextVibe={vibe} />)}
      </div>
    </Phone>
  );
}

function App() {
  return (
    <window.DesignCanvas
      title="Vibecast — Sliver in All Vibes"
      subtitle="Three takes on what color the started-row sliver should be when the user is in All Vibes (no single context vibe). Each option shown side-by-side with a vibe-specific view so you can see how it reads in both contexts."
    >
      <window.DCSection
        id="opt-a"
        title="A · Sliver = primary vibe (recommended)"
        subtitle="Each show has a primary vibe (the first in its tag list — Hard Fork is around, Daily is morning, etc). The sliver lives on UNPLAYED rows as a quiet attractor. In All Vibes it uses each row's primary, becoming a chromatic column down the left edge that makes the home view feel chromatic without shouting. In a specific vibe view all slivers are uniform (every row shares that vibe) so the sliver reads as a clean section marker. Same rule, two visual personalities."
      >
        <window.DCArtboard id="a-all" label="All vibes" width={460} height={950}>
          <AllVibesView sliverMode="primary" />
        </window.DCArtboard>
        <window.DCArtboard id="a-around" label="Around (vibe view)" width={460} height={950}>
          <VibeView vibeId="around" sliverMode="primary" />
        </window.DCArtboard>
      </window.DCSection>

      <window.DCSection
        id="opt-b"
        title="B · Sliver = ink in All Vibes"
        subtitle="A simpler, more conservative answer: in All Vibes, the sliver is just ink (a quiet tick mark). No chromatic noise on the home view; the started state is communicated through italic + ring + minutes left. In a specific vibe view, the sliver becomes that vibe's color. Strict separation — color belongs to vibes, not to the home view."
      >
        <window.DCArtboard id="b-all" label="All vibes" width={460} height={950}>
          <AllVibesView sliverMode="ink" />
        </window.DCArtboard>
        <window.DCArtboard id="b-around" label="Around (vibe view)" width={460} height={950}>
          <VibeView vibeId="around" sliverMode="context" />
        </window.DCArtboard>
      </window.DCSection>

      <window.DCSection
        id="opt-c"
        title="C · Split sliver for multi-vibe shows"
        subtitle="Same as A, but multi-vibe shows get a 50/50 split sliver instead of just their primary. Surfaces the show's full vibe membership at a glance. Risk: the split is a tiny graphic at this scale — it can read as a glitch rather than intentional, especially when scrolling. Worth seeing on a real device before committing."
      >
        <window.DCArtboard id="c-all" label="All vibes · split" width={460} height={950}>
          <AllVibesView sliverMode="split" />
        </window.DCArtboard>
        <window.DCArtboard id="c-around" label="Around · split" width={460} height={950}>
          <VibeView vibeId="around" sliverMode="primary" />
        </window.DCArtboard>
      </window.DCSection>

      <window.DCSection id="rec" title="My take">
        <window.DCArtboard id="rec-card" label="Recommendation" width={620} height={460}>
          <RecCard />
        </window.DCArtboard>
      </window.DCSection>
    </window.DesignCanvas>
  );
}

function RecCard() {
  const Row = ({ k, v }) => (
    <div style={{ display: 'flex', gap: 16, padding: '10px 0', borderTop: '1px solid rgba(0,0,0,0.08)' }}>
      <div style={{ width: 110, fontFamily: T.mono, fontSize: 10, color: 'rgba(0,0,0,0.55)', letterSpacing: '0.10em', textTransform: 'uppercase', paddingTop: 2, fontWeight: 600 }}>{k}</div>
      <div style={{ flex: 1, fontSize: 14, lineHeight: 1.55, color: T.ink }}>{v}</div>
    </div>
  );
  return (
    <div style={{ background: T.paper, height: '100%', padding: 24, fontFamily: T.sans }}>
      <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'rgba(0,0,0,0.5)', fontWeight: 600 }}>RECOMMENDATION</div>
      <div style={{ fontFamily: T.serif, fontSize: 26, fontWeight: 500, letterSpacing: '-0.025em', marginTop: 4, marginBottom: 6 }}>A — sliver uses the show's primary vibe</div>
      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 14, color: 'rgba(0,0,0,0.62)', marginBottom: 8 }}>The sliver gets a personality split across the two views without any code branching.</div>
      <Row k="Why" v="Every show already has a 'home vibe' (the first item in its tags). Using it for the sliver on unplayed rows means the rule is the same in both views — but the visual outcome shifts. All Vibes gets a chromatic column that quietly reinforces 'every show belongs to a vibe.' A specific vibe view gets a uniform stripe that reads as a section marker." />
      <Row k="Multi-vibe shows" v="Use just the primary. The split (option C) is too tiny to register as intentional at row scale and risks looking like a rendering glitch. The chip-tint background is still doing the gradient duty for multi-vibe shows." />
      <Row k="Why not B" v="Ink in All Vibes 'works' but loses the connection — the sliver is the strongest started signal we have, and forcing it neutral throws away free brand surface. A is louder but earned: it's the same brand thread (vibe color) we use everywhere else." />
      <Row k="Edge case" v="Shows with no vibes at all (just-subscribed, untagged) — sliver falls back to ink. Same row works in any state." />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
