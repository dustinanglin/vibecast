name: TestFlight

on:
  # Manual trigger from GitHub Actions UI — primary way to release.
  workflow_dispatch:
    inputs:
      changelog:
        description: "TestFlight changelog (overrides default)"
        required: false
        type: string

  # Optional automatic trigger: any push to main that touches actual app
  # source (not docs / scripts). Comment this block out if you want
  # manual-only releases.
  push:
    branches: [main]
    paths:
      - "Vibecast/**"
      - "fastlane/**"
      - "Gemfile*"
      - ".github/workflows/testflight.yml"

# Only one TestFlight upload at a time. Don't cancel mid-upload — once an
# .ipa is on Apple's servers we want it to finish gracefully.
concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    name: Build + upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Pin to the latest stable Xcode on the macos-15 image. Adjust
          # if the runner image rotates and our Swift code starts failing
          # under a newer version's stricter checks.
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Set up Ruby + cache bundler
        uses: ruby/setup-ruby@v1
        with:
          # 3.1 matches the upper bound of the dep tree resolved against the
          # local system Ruby 2.6 (CFPropertyList 3.0.9 requires Ruby < 3.2).
          # Bump to 3.2 once we regenerate Gemfile.lock with a newer Ruby.
          ruby-version: "3.1"
          bundler: latest        # ignore the local 1.17.2 (no `untaint` on Ruby 3+)
          bundler-cache: true    # caches gems based on Gemfile.lock

      - name: Materialise App Store Connect API key
        env:
          KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey.p8"
          mkdir -p "$(dirname "$KEY_PATH")"
          echo -n "$KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          head -1 "$KEY_PATH"   # sanity check: should print "-----BEGIN PRIVATE KEY-----"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Run fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          # APP_STORE_CONNECT_API_KEY_PATH inherited from $GITHUB_ENV (set by
          # the previous step). Hard-coding a path here would be brittle since
          # ${{ env.HOME }} doesn't expand to the runner's $HOME.
          CHANGELOG: ${{ inputs.changelog || format('Build from main — commit {0}', github.sha) }}
          # Suppress fastlane's interactive prompts.
          FASTLANE_HIDE_CHANGELOG: "0"
          FASTLANE_DISABLE_COLORS: "1"
        run: bundle exec fastlane beta

      - name: Cleanup API key
        if: always()
        run: rm -f "${APP_STORE_CONNECT_API_KEY_PATH:-$HOME/private_keys/AuthKey.p8}"
